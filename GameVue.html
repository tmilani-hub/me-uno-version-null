<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="stylesheet" href="GameToPretie.css">
    <title>Document</title>
</head>

<body>
    <header>
        <a href="https://fr.wikipedia.org/wiki/Uno#:~:text=Règles%20du%20jeu-,But%20du%20jeu,un%20joueur%20atteigne%20500%20points." class="normalbtn" id="info" type="button">info</a>
        <div class="infoGame">
            <h3>c'est le tour de <span id="aQuiCest"></span>. \ Le prochain c'est <span id="auProchainCest"></span>
            </h3>
        </div>
        <form id="setgame">

            <button class="normalbtn" id="start" type="submit">Commencer une partie</button>
        </form>
    </header>
    <main>
        <h1>UNO</h1>
        <section id="GameVue"></section>
    </main>
    <script src="uno.js"></script>
</body>

</html>
